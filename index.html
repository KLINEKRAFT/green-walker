<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<title>Green Walker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none;}
html,body{overflow:hidden;overscroll-behavior:none;background:#1a1a1a;width:100%;height:100%;font-family:'Helvetica Neue',Helvetica,sans-serif;}
canvas{display:block;touch-action:none;}

#loadscreen{position:fixed;inset:0;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity 1s;}
#loadscreen h1{font-size:11px;letter-spacing:.25em;text-transform:uppercase;color:#fff;font-weight:400;margin-bottom:28px;}
#loadbar-wrap{width:220px;height:1px;background:rgba(255,255,255,.15);}
#loadbar{height:1px;background:#fff;width:0%;transition:width .3s;}
#loadlabel{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-top:14px;}

#vi{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 50%,transparent 50%,rgba(0,0,0,.45) 100%);}
#xh{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;opacity:0;transition:opacity .2s;width:1px;height:13px;background:rgba(255,255,255,.65);}
#xh::after{content:'';position:absolute;width:13px;height:1px;background:rgba(255,255,255,.65);top:0;left:-6px;}

#overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.55);z-index:50;cursor:pointer;}
.ob{background:rgba(0,0,0,.92);color:#fff;padding:30px 50px;text-align:center;}
.ob h2{font-size:11px;letter-spacing:.22em;text-transform:uppercase;font-weight:500;margin:0 0 11px;}
.ob p{font-size:9px;letter-spacing:.14em;text-transform:uppercase;opacity:.38;line-height:2.3;margin:0;}

#arrival{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity 2s;z-index:60;}
#arrival h3{font-size:10px;letter-spacing:.35em;text-transform:uppercase;font-weight:400;color:rgba(255,255,255,.9);}
#arrival p{font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-top:8px;text-align:center;}

#compass{position:fixed;top:max(14px,env(safe-area-inset-top,14px));right:max(18px,env(safe-area-inset-right,18px));width:36px;height:36px;pointer-events:none;opacity:0;transition:opacity .5s;}

#joybase{position:fixed;border-radius:50%;border:1.5px solid rgba(255,255,255,.28);pointer-events:none;z-index:5;display:none;}
#joydot{position:fixed;border-radius:50%;background:rgba(255,255,255,.4);pointer-events:none;z-index:5;display:none;transform:translate(-50%,-50%);}
</style>
</head>
<body>

<div id="loadscreen">
  <h1>Green Walker</h1>
  <div id="loadbar-wrap"><div id="loadbar"></div></div>
  <div id="loadlabel">Loading world...</div>
</div>
<div id="vi"></div>
<div id="xh"></div>
<div id="overlay">
  <div class="ob">
    <h2 id="overlay-title">Click to Enter</h2>
    <p id="overlay-hint">W A S D &mdash; Walk<br>Mouse &mdash; Look<br>Shift &mdash; Sprint</p>
  </div>
</div>
<div id="arrival">
  <div style="text-align:center;">
    <h3>You found it.</h3>
    <p>The cabin at the end of the path</p>
  </div>
</div>
<canvas id="compass"></canvas>
<div id="joybase"></div>
<div id="joydot"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
// ── DEVICE DETECTION ─────────────────────────────────────────────────
const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || navigator.maxTouchPoints > 1;

if (isMobile) {
  document.getElementById('overlay-title').textContent = 'Tap to Explore';
  document.getElementById('overlay-hint').innerHTML = 'Left side &mdash; Move<br>Right side &mdash; Look';
}

// ── CONSTANTS ─────────────────────────────────────────────────────────
const SKY      = 0x8ab8cc;
const T_SCALE  = new THREE.Vector3(120, 15, 120);
const WORLD_HX = 114, WORLD_HZ = 114;
const GRID     = 96;
const CABIN_X  = 55, CABIN_Z = -20;
const LANDMARK_X = 28, LANDMARK_Z = -10;

// ── RNG ───────────────────────────────────────────────────────────────
function mkRng(seed){
  let s=(seed^0x5f3759df)>>>0;
  return()=>{s=(Math.imul(s,1664525)+1013904223)>>>0;return s/4294967296;};
}

// ── RENDERER ──────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({antialias:false, powerPreference: isMobile?'low-power':'high-performance'});
renderer.setPixelRatio(isMobile ? Math.min(window.devicePixelRatio, 1.5) : Math.min(window.devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(SKY);
document.body.insertBefore(renderer.domElement, document.body.firstChild);
renderer.domElement.style.touchAction = 'none';

// ── SCENE ─────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(SKY);
scene.fog = new THREE.FogExp2(SKY, isMobile ? 0.011 : 0.008);

const cam = new THREE.PerspectiveCamera(isMobile ? 78 : 72, innerWidth/innerHeight, 0.1, 500);
cam.position.set(0, 5, 0);
scene.add(cam);

scene.add(new THREE.AmbientLight(0xd8ecd0, 0.55));
const sun = new THREE.DirectionalLight(0xfff4cc, 1.1);
sun.position.set(80,100,50); scene.add(sun);
const fill = new THREE.DirectionalLight(0x88a8c0, 0.4);
fill.position.set(-60,40,-60); scene.add(fill);

// ── HEIGHTMAP ─────────────────────────────────────────────────────────
let heightGrid = null;

function bakeHeights(geo){
  const pos=geo.attributes.position.array;
  heightGrid=new Float32Array(GRID*GRID).fill(-9999);
  for(let i=0;i<pos.length;i+=3){
    const wx=pos[i]*T_SCALE.x, wy=pos[i+1]*T_SCALE.y, wz=pos[i+2]*T_SCALE.z;
    const gx=Math.round((wx/WORLD_HX+1)*.5*(GRID-1));
    const gz=Math.round((wz/WORLD_HZ+1)*.5*(GRID-1));
    if(gx>=0&&gx<GRID&&gz>=0&&gz<GRID){const idx=gx*GRID+gz;if(wy>heightGrid[idx])heightGrid[idx]=wy;}
  }
  for(let i=0;i<heightGrid.length;i++)if(heightGrid[i]<-9000)heightGrid[i]=0;
}

function sh(wx,wz){
  if(!heightGrid)return 0;
  const gxf=(wx/WORLD_HX+1)*.5*(GRID-1), gzf=(wz/WORLD_HZ+1)*.5*(GRID-1);
  const x0=Math.max(0,Math.min(GRID-2,gxf|0)), z0=Math.max(0,Math.min(GRID-2,gzf|0));
  const fx=gxf-x0,fz=gzf-z0;
  return heightGrid[x0*GRID+z0]*(1-fx)*(1-fz)+heightGrid[(x0+1)*GRID+z0]*fx*(1-fz)
        +heightGrid[x0*GRID+z0+1]*(1-fx)*fz+heightGrid[(x0+1)*GRID+z0+1]*fx*fz;
}

// ── TERRAIN COLOURS ───────────────────────────────────────────────────
const C_LOW=new THREE.Color(0x4a7a3a),C_MID=new THREE.Color(0x5a9048),
      C_UP=new THREE.Color(0x7a8860),C_PEAK=new THREE.Color(0x887a68);

function addTerrainColors(geo){
  const pos=geo.attributes.position.array, cols=new Float32Array(pos.length), c=new THREE.Color();
  for(let i=0;i<pos.length;i+=3){
    const ny=pos[i+1];
    if(ny<-.06)c.set(C_LOW);
    else if(ny<.02)c.lerpColors(C_LOW,C_MID,(ny+.06)/.08);
    else if(ny<.10)c.lerpColors(C_MID,C_UP,(ny-.02)/.08);
    else c.lerpColors(C_UP,C_PEAK,Math.min(1,(ny-.10)/.05));
    cols[i]=c.r;cols[i+1]=c.g;cols[i+2]=c.b;
  }
  geo.setAttribute('color',new THREE.Float32BufferAttribute(cols,3));
}

// ── MATERIALS ─────────────────────────────────────────────────────────
const MAT={
  terrain:new THREE.MeshLambertMaterial({vertexColors:true,flatShading:true}),
  pine:   new THREE.MeshLambertMaterial({color:0x2c5c28,flatShading:true}),
  pinetall:new THREE.MeshLambertMaterial({color:0x1e4a20,flatShading:true}),
  dead:   new THREE.MeshLambertMaterial({color:0x5c4830,flatShading:true}),
  shrub:  new THREE.MeshLambertMaterial({color:0x3a6830,flatShading:true}),
  rock:   new THREE.MeshLambertMaterial({color:0x6a6858,flatShading:true}),
  cliff:  new THREE.MeshLambertMaterial({color:0x787060,flatShading:true}),
  cabin:  new THREE.MeshLambertMaterial({color:0x7a5030,flatShading:true}),
  wood:   new THREE.MeshLambertMaterial({color:0x5c3820,flatShading:true}),
  debris: new THREE.MeshLambertMaterial({color:0x5a5040,flatShading:true}),
  path:   new THREE.MeshLambertMaterial({color:0x9a8060,flatShading:true}),
  player: new THREE.MeshPhongMaterial({color:0x00ff41,shininess:30,flatShading:true}),
};

// ── ASSET DEFINITIONS (mobile counts reduced) ─────────────────────────
const M=isMobile;
const DEFS=[
  {id:'terrain',  f:'assets_neon_hills.glb',        mat:'terrain', role:'terrain'},
  {id:'pine',     f:'assets_pine_tree_main.glb',    mat:'pine',    role:'instanced', n:M?5:12,  s:[8,9,8]},
  {id:'pinetall', f:'assets_pine_tree_tall.glb',    mat:'pinetall',role:'instanced', n:M?0:7,   s:[5,12,5]},
  {id:'dead',     f:'assets_tree_dead.glb',         mat:'dead',    role:'instanced', n:M?3:7,   s:[7,9,7]},
  {id:'shrub',    f:'assets_shrub.glb',             mat:'shrub',   role:'instanced', n:M?0:12,  s:[4,3,4]},
  {id:'boulder',  f:'assets_boulder_single.glb',   mat:'rock',    role:'instanced', n:M?8:18,  s:[3,2,3]},
  {id:'rockform', f:'assets_rock_formation_1.glb', mat:'rock',    role:'instanced', n:M?3:6,   s:[5,5,5]},
  {id:'srock1',   f:'assets_small_boulders_1.glb', mat:'rock',    role:'instanced', n:M?5:12,  s:[3,2.5,3]},
  {id:'srock2',   f:'assets_small_boulders_2.glb', mat:'rock',    role:'instanced', n:M?5:12,  s:[3,2.5,3]},
  {id:'log',      f:'assets_log.glb',              mat:'wood',    role:'instanced', n:M?4:10,  s:[4,1.5,1.5]},
  {id:'debris',   f:'assets_debris.glb',           mat:'debris',  role:'instanced', n:M?3:8,   s:[4,2,4]},
  {id:'landmark', f:'assets_rock_landmark.glb',    mat:'rock',    role:'single',    s:[9,9,9], px:LANDMARK_X,pz:LANDMARK_Z},
  {id:'cliff',    f:'assets_cliff_wall_corner.glb',mat:'cliff',   role:'corners',   s:[15,15,15]},
  {id:'cabin',    f:'assets_cabin.glb',            mat:'cabin',   role:'cabin',     s:[5,5,5], px:CABIN_X,pz:CABIN_Z},
  {id:'path',     f:'assets_path_1.glb',           mat:'path',    role:'path',      s:[4,1,12],n:3},
];

// ── LOADING ───────────────────────────────────────────────────────────
const loaded={};
const gltfLoader=new THREE.GLTFLoader();
let doneCount=0;
const TOTAL=DEFS.length;

function setProgress(label){
  doneCount++;
  document.getElementById('loadbar').style.width=(doneCount/TOTAL*100).toFixed(0)+'%';
  document.getElementById('loadlabel').textContent=label;
}

function loadAsset(def){
  return new Promise(resolve=>{
    gltfLoader.load(def.f,
      gltf=>{loaded[def.id]=gltf;setProgress(def.id);resolve();},
      null,
      err=>{console.warn('Skip:',def.f);setProgress(def.id);resolve();}
    );
  });
}

Promise.all(DEFS.map(loadAsset)).then(buildWorld);

// ── GEOMETRY UTIL ────────────────────────────────────────────────────
function getGeo(gltf){
  if(!gltf)return null;
  let geo=null;
  gltf.scene.traverse(c=>{if(c.isMesh&&!geo)geo=c.geometry;});
  if(geo)geo.computeVertexNormals();
  return geo;
}

// ── BUILD WORLD ──────────────────────────────────────────────────────
const dummy=new THREE.Object3D();

function buildWorld(){
  // Terrain
  const tGLB=loaded.terrain;
  if(tGLB){
    const geo=getGeo(tGLB);
    addTerrainColors(geo);
    bakeHeights(geo);
    const mesh=new THREE.Mesh(geo,MAT.terrain);
    mesh.scale.copy(T_SCALE);
    scene.add(mesh);
  }

  const rng=mkRng(1337);
  const avoid=[{x:0,z:0,r:16},{x:CABIN_X,z:CABIN_Z,r:20},{x:LANDMARK_X,z:LANDMARK_Z,r:12}];

  function ok(x,z){
    if(Math.abs(x)>WORLD_HX-8||Math.abs(z)>WORLD_HZ-8)return false;
    for(const a of avoid)if((x-a.x)**2+(z-a.z)**2<a.r*a.r)return false;
    return true;
  }

  function randPts(n){
    const pts=[];
    for(let i=0,t=0;i<n&&t<n*25;t++){
      const x=(rng()-.5)*WORLD_HX*1.7,z=(rng()-.5)*WORLD_HZ*1.7;
      if(ok(x,z)){pts.push({x,z});i++;}
    }
    return pts;
  }

  // Cabin
  const cabinGeo=getGeo(loaded.cabin);
  if(cabinGeo){
    const m=new THREE.Mesh(cabinGeo,MAT.cabin);
    m.position.set(CABIN_X,sh(CABIN_X,CABIN_Z),CABIN_Z);
    m.scale.set(5,5,5);m.rotation.y=Math.PI*.6;
    scene.add(m);
    CABIN_WORLD.set(CABIN_X,sh(CABIN_X,CABIN_Z)+4,CABIN_Z);
  }

  // Rock landmark
  const lmGeo=getGeo(loaded.landmark);
  if(lmGeo){
    const m=new THREE.Mesh(lmGeo,MAT.rock);
    m.position.set(LANDMARK_X,sh(LANDMARK_X,LANDMARK_Z),LANDMARK_Z);
    m.scale.set(9,9,9);scene.add(m);
  }

  // Path
  const pathGeo=getGeo(loaded.path);
  if(pathGeo){
    const angle=Math.atan2(CABIN_X,CABIN_Z);
    for(let i=0;i<3;i++){
      const t=(i+.5)/3, wx=CABIN_X*t, wz=CABIN_Z*t;
      const m=new THREE.Mesh(pathGeo,MAT.path);
      m.position.set(wx,sh(wx,wz)+.15,wz);
      m.rotation.y=angle;m.scale.set(4,1,12);scene.add(m);
    }
  }

  // Cliff corners
  const cliffGeo=getGeo(loaded.cliff);
  if(cliffGeo){
    [{x:108,z:-108,ry:0},{x:-108,z:-108,ry:Math.PI*.5},
     {x:-108,z:108,ry:Math.PI},{x:108,z:108,ry:Math.PI*1.5}].forEach(c=>{
      const m=new THREE.Mesh(cliffGeo,MAT.cliff);
      m.position.set(c.x,sh(c.x,c.z),c.z);m.scale.set(15,15,15);m.rotation.y=c.ry;scene.add(m);
    });
  }

  // Instanced props
  for(const def of DEFS.filter(d=>d.role==='instanced'&&d.n>0)){
    const geo=getGeo(loaded[def.id]);
    if(!geo)continue;
    const pts=randPts(def.n);
    if(!pts.length)continue;
    const im=new THREE.InstancedMesh(geo,MAT[def.mat],pts.length);
    pts.forEach((pt,i)=>{
      const sv=.8+rng()*.4;
      dummy.position.set(pt.x,sh(pt.x,pt.z),pt.z);
      dummy.rotation.set(0,rng()*Math.PI*2,0);
      dummy.scale.set(def.s[0]*sv,def.s[1]*sv,def.s[2]*sv);
      dummy.updateMatrix();im.setMatrixAt(i,dummy.matrix);
    });
    im.instanceMatrix.needsUpdate=true;scene.add(im);
  }

  cam.position.set(0,sh(0,0)+1.9,0);

  const ls=document.getElementById('loadscreen');
  ls.style.opacity='0';
  setTimeout(()=>ls.style.display='none',1000);
  document.getElementById('compass').style.opacity='1';
}

// ── HANDS ────────────────────────────────────────────────────────────
let handsRoot=null;

  root.traverse(c=>{if(c.isMesh){c.material=MAT.player;c.frustumCulled=false;}});

  cam.add(root);handsRoot=root;

// ── ARRIVAL ───────────────────────────────────────────────────────────
const CABIN_WORLD=new THREE.Vector3(CABIN_X,5,CABIN_Z);
let arrived=false,arrivalFog=0;

function checkArrival(){
  if(arrived||!heightGrid)return;
  if(cam.position.distanceTo(CABIN_WORLD)<11){
    arrived=true;
    document.getElementById('arrival').style.opacity='1';
    arrivalFog=1;
    setTimeout(()=>document.getElementById('arrival').style.opacity='0',5000);
  }
}

// ── COMPASS ───────────────────────────────────────────────────────────
const compassEl=document.getElementById('compass');
compassEl.width=compassEl.height=72;
const ctx2=compassEl.getContext('2d');

function drawCompass(){
  ctx2.clearRect(0,0,72,72);
  ctx2.strokeStyle='rgba(255,255,255,.22)';ctx2.lineWidth=.5;
  ctx2.beginPath();ctx2.arc(36,36,28,0,Math.PI*2);ctx2.stroke();
  const dx=CABIN_X-cam.position.x,dz=CABIN_Z-cam.position.z;
  const wa=Math.atan2(dx,dz),ra=wa-yaw;
  const cx2=36+Math.sin(ra)*20,cy2=36-Math.cos(ra)*20;
  ctx2.fillStyle=arrived?'rgba(255,190,80,.75)':'rgba(255,255,255,.5)';
  ctx2.beginPath();ctx2.arc(cx2,cy2,3,0,Math.PI*2);ctx2.fill();
  const na=-yaw;
  ctx2.fillStyle='rgba(255,255,255,.22)';ctx2.font='7px Helvetica';
  ctx2.textAlign='center';ctx2.textBaseline='middle';
  ctx2.fillText('N',36+Math.sin(na)*20,36-Math.cos(na)*20);
}

// ── INPUT: KEYBOARD ───────────────────────────────────────────────────
const keys={};
window.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(['KeyW','KeyS','KeyA','KeyD','Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();
});
window.addEventListener('keyup',e=>keys[e.code]=false);

// ── INPUT: POINTER LOCK (desktop) ────────────────────────────────────
let yaw=0,pitch=0,bob=0,pLocked=false;
const cv=renderer.domElement;

let gameStarted=false;
function tryStart(){
  if(gameStarted)return;
  gameStarted=true;
  document.getElementById('overlay').style.display='none';
  if(!isMobile&&cv.requestPointerLock)cv.requestPointerLock();
}

document.getElementById('overlay').addEventListener('click',tryStart);
document.getElementById('overlay').addEventListener('touchend',e=>{e.preventDefault();tryStart();},{passive:false});

document.addEventListener('pointerlockchange',()=>{
  pLocked=document.pointerLockElement===cv;
  if(!pLocked&&gameStarted&&!isMobile)document.getElementById('overlay').style.display='flex';
  document.getElementById('xh').style.opacity=pLocked?1:0;
});
document.addEventListener('mousemove',e=>{
  if(!pLocked)return;
  yaw-=e.movementX*.002;
  pitch=Math.max(-1.3,Math.min(1.3,pitch-e.movementY*.002));
});

// ── INPUT: TOUCH (mobile) ─────────────────────────────────────────────
const joyL={active:false,id:-1,ox:0,oy:0,dx:0,dy:0};
const joyR={active:false,id:-1,lx:0,ly:0};
const JOY_R=44;
const joybaseEl=document.getElementById('joybase');
const joydotEl =document.getElementById('joydot');

window.addEventListener('touchstart',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.clientX<innerWidth*.5&&!joyL.active){
      joyL.active=true;joyL.id=t.identifier;joyL.ox=t.clientX;joyL.oy=t.clientY;joyL.dx=0;joyL.dy=0;
      joybaseEl.style.cssText=`display:block;left:${t.clientX-JOY_R}px;top:${t.clientY-JOY_R}px;width:${JOY_R*2}px;height:${JOY_R*2}px;`;
      joydotEl.style.cssText=`display:block;left:${t.clientX}px;top:${t.clientY}px;width:28px;height:28px;`;
    }else if(t.clientX>=innerWidth*.5&&!joyR.active){
      joyR.active=true;joyR.id=t.identifier;joyR.lx=t.clientX;joyR.ly=t.clientY;
    }
  }
},{passive:false});

window.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier===joyL.id){
      const dx=t.clientX-joyL.ox,dy=t.clientY-joyL.oy;
      const len=Math.sqrt(dx*dx+dy*dy),R=JOY_R;
      joyL.dx=len>0?dx/len*Math.min(1,len/R):0;
      joyL.dy=len>0?dy/len*Math.min(1,len/R):0;
      joydotEl.style.left=(joyL.ox+joyL.dx*R)+'px';
      joydotEl.style.top =(joyL.oy+joyL.dy*R)+'px';
    }
    if(t.identifier===joyR.id){
      yaw-=(t.clientX-joyR.lx)*.004;
      pitch=Math.max(-1.3,Math.min(1.3,pitch-(t.clientY-joyR.ly)*.004));
      joyR.lx=t.clientX;joyR.ly=t.clientY;
    }
  }
},{passive:false});

window.addEventListener('touchend',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier===joyL.id){joyL.active=false;joyL.dx=0;joyL.dy=0;joybaseEl.style.display='none';joydotEl.style.display='none';}
    if(t.identifier===joyR.id){joyR.active=false;}
  }
},{passive:false});

window.addEventListener('resize',()=>{
  cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

// ── GAME LOOP ─────────────────────────────────────────────────────────
const eul=new THREE.Euler(0,0,0,'YXZ'),fv=new THREE.Vector3(),rv=new THREE.Vector3(),vel=new THREE.Vector3();
const SKY_COL=new THREE.Color(SKY),WARM_COL=new THREE.Color(0xd4a860);
let prev=performance.now();

function loop(){
  requestAnimationFrame(loop);
  const now=performance.now(),dt=Math.min((now-prev)/1000,.05);prev=now;

  eul.y=yaw;
  fv.set(0,0,-1).applyEuler(eul);rv.set(1,0,0).applyEuler(eul);vel.set(0,0,0);

  // Keyboard
  const kf=(keys.KeyW||keys.ArrowUp?1:0)-(keys.KeyS||keys.ArrowDown?1:0);
  const kr=(keys.KeyD||keys.ArrowRight?1:0)-(keys.KeyA||keys.ArrowLeft?1:0);
  if(kf)vel.addScaledVector(fv,kf);
  if(kr)vel.addScaledVector(rv,kr);

  // Touch joystick
  if(joyL.active){
    if(Math.abs(joyL.dy)>.05)vel.addScaledVector(fv,-joyL.dy);
    if(Math.abs(joyL.dx)>.05)vel.addScaledVector(rv, joyL.dx);
  }

  const moving=vel.lengthSq()>.001;
  const sprint=isMobile
    ?(joyL.active&&(Math.abs(joyL.dx)>.82||Math.abs(joyL.dy)>.82))
    :(keys.ShiftLeft||keys.ShiftRight);

  if(moving){vel.normalize();cam.position.addScaledVector(vel,(sprint?10:5.5)*dt);bob+=dt*(sprint?10:6);}

  cam.position.x=Math.max(-WORLD_HX+5,Math.min(WORLD_HX-5,cam.position.x));
  cam.position.z=Math.max(-WORLD_HZ+5,Math.min(WORLD_HZ-5,cam.position.z));

  const ty=sh(cam.position.x,cam.position.z)+1.75;
  cam.position.y+=(ty-cam.position.y)*.15;

  cam.rotation.order='YXZ';cam.rotation.y=yaw;cam.rotation.x=pitch;

  if(handsRoot)handsRoot.position.y=-.55+Math.sin(bob)*.015;

  const tfov=(moving&&sprint?82:isMobile?78:72);
  cam.fov+=(tfov-cam.fov)*.08;cam.updateProjectionMatrix();

  checkArrival();
  if(arrivalFog>0)arrivalFog=Math.max(0,arrivalFog-dt*.15);
  const fogCol=new THREE.Color().lerpColors(SKY_COL,WARM_COL,arrivalFog);
  scene.fog.color.copy(fogCol);scene.background.copy(fogCol);

  drawCompass();
  renderer.render(scene,cam);
}
loop();
</script>
